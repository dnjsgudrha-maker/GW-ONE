deploy.yml

적용 방법
GitHub Desktop에서 Show in Explorer를 눌러 GW-ONE 폴더를 연 다음:

.github
└─ workflows
   └─ deploy.yml
기존 deploy.yml을 방금 받은 파일로 덮어쓰기해.

그다음 GitHub Desktop으로 돌아가면 변경 파일 1개가 보여.

Summary에:

Fix GitHub Pages deploy
입력하고:

Commit to main
→ Push origin
누르면 자동으로 다시 배포돼.

이번 파일에는 Node도 22로 올렸고, Vite와 PWA 같은 개발 패키지를 확실하게 설치하도록 수정했어. 초록 체크가 뜨면 다음은 Firebase 비밀값 6개 등록 단계야. 


라이브러리
/
deploy.yml


name: Deploy GW ONE to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
